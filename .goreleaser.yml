version: 2

project_name: agent-packs

before:
  hooks:
    - go mod tidy

builds:
  - id: agent-packs
    main: ./cli/cmd/agent-packs
    binary: agent-packs
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/sandeshh/agent-packs/cli/internal/version.Version={{.Version}}
      - -X github.com/sandeshh/agent-packs/cli/internal/version.Commit={{.Commit}}
      - -X github.com/sandeshh/agent-packs/cli/internal/version.Date={{.Date}}

archives:
  - id: agent-packs
    builds:
      - agent-packs
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "New Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Registry"
      regexp: "^registry|^pack|^skill"
      order: 2
    - title: Other
      order: 999

brews:
  - name: agent-packs
    repository:
      owner: sandeshh
      name: homebrew-agent-packs
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/sandeshh/agent-packs"
    description: "Homebrew for AI agent skills and plugins — install curated packs into Claude Code, Cursor, Codex, and more"
    license: "Apache-2.0"
    install: |
      bin.install "agent-packs"
    test: |
      system "#{bin}/agent-packs", "version"
