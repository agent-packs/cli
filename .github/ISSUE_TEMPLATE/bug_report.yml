name: Bug Report
description: Report a reproducible Agent Packs problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps
      description: Include commands, pack IDs, target agent, and install mode.
      placeholder: |
        1. Run `agent-packs ...`
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Agent Packs version, OS, install method, and target editor.
      placeholder: |
        agent-packs version:
        OS:
        install method:
        target agent:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or Output
      render: shell
