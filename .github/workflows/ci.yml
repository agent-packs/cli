name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install Python test deps
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r tests/requirements.txt
      - name: Go tests
        run: go test ./...
      - name: Build CLI
        run: go build -o bin/agent-packs ./cmd/agent-packs
      - name: Python integration and docs tests
        run: .venv/bin/python -m unittest discover -s tests
      - name: Prepare GitHub Pages site
        # The catalog fetches the registry index live from
        # github.com/agent-packs/registry, so no registry data is bundled here.
        run: |
          mkdir -p site
          cp docs/index.html site/index.html
          cp docs/catalog.html site/catalog.html
      - name: Upload catalog artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy-pages:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
