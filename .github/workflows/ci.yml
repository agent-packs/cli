name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum
      - name: gofmt
        if: matrix.os == 'ubuntu-latest'
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:" && echo "$unformatted" && exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: Go tests
        run: go test ./...
      - name: Build CLI
        run: go build -o bin/agent-packs ./cmd/agent-packs
      - name: Smoke test built binary
        run: ./bin/agent-packs version
      # The Python integration suite drives the built binary with temp
      # registries. It exercises POSIX paths/symlinks, so it runs on the
      # Unix legs of the matrix.
      - uses: actions/setup-python@v7
        if: matrix.os != 'windows-latest'
        with:
          python-version: "3.x"
      - name: Install Python test deps
        if: matrix.os != 'windows-latest'
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r tests/requirements.txt
      - name: Python integration and docs tests
        if: matrix.os != 'windows-latest'
        run: .venv/bin/python -m unittest discover -s tests

  pages-artifact:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Prepare GitHub Pages site
        # The catalog fetches the registry index live from
        # github.com/agent-packs/registry, so no registry data is bundled here.
        run: |
          mkdir -p site
          cp docs/index.html site/index.html
          cp docs/catalog.html site/catalog.html
          cp docs/og.png site/og.png
          cp docs/favicon.svg site/favicon.svg
      - name: Upload catalog artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy-pages:
    needs: pages-artifact
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
