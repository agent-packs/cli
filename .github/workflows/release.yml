name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build release binaries
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          mkdir -p dist
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            out="agent-packs_${os}_${arch}"
            GOOS="${os}" GOARCH="${arch}" go build \
              -ldflags "-X github.com/sandeshh/agent-packs/cli/internal/version.Version=${VERSION#v} -X github.com/sandeshh/agent-packs/cli/internal/version.Commit=${COMMIT:0:7}" \
              -o "dist/${out}/agent-packs" ./cmd/agent-packs
            tar -C "dist/${out}" -czf "dist/${out}.tar.gz" agent-packs
          done
        working-directory: cli
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: cli/dist/*.tar.gz
          generate_release_notes: true
