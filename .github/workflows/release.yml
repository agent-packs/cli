name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build multi-platform binaries
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X github.com/agent-packs/cli/internal/version.Version=${VERSION#v} -X github.com/agent-packs/cli/internal/version.Commit=${COMMIT:0:7}"
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            out="agent-packs_${os}_${arch}"
            GOOS="${os}" GOARCH="${arch}" CGO_ENABLED=0 go build \
              -ldflags "${LDFLAGS}" \
              -o "dist/${out}/agent-packs" ./cmd/agent-packs
            # Bundle the agent-packs skill; the registry is fetched at runtime
            # from github.com/agent-packs/registry on first use.
            cp -R skills "dist/${out}/skills"
            tar -C "dist/${out}" -czf "dist/${out}.tar.gz" agent-packs skills
          done
          # Windows amd64
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build \
            -ldflags "${LDFLAGS}" \
            -o "dist/agent-packs_windows_amd64/agent-packs.exe" ./cmd/agent-packs
          cp -R skills dist/agent-packs_windows_amd64/skills
          cd dist/agent-packs_windows_amd64 && zip -r ../agent-packs_windows_amd64.zip agent-packs.exe skills && cd ../..
          # Checksums
          cd dist && sha256sum *.tar.gz *.zip > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          generate_release_notes: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Dispatch Homebrew tap sync
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          gh api repos/agent-packs/homebrew-tap/dispatches \
            -f event_type=agent-packs-release \
            -F client_payload[version]="${RELEASE_VERSION}"
