name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Build multi-platform binaries
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X github.com/sandeshh/agent-packs/cli/internal/version.Version=${VERSION#v} -X github.com/sandeshh/agent-packs/cli/internal/version.Commit=${COMMIT:0:7}"
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            out="agent-packs_${os}_${arch}"
            GOOS="${os}" GOARCH="${arch}" CGO_ENABLED=0 go build \
              -ldflags "${LDFLAGS}" \
              -o "dist/${out}/agent-packs" ./cmd/agent-packs
            # Bundle the agent-packs skills so the binary works standalone
            cp -R ../skills "dist/${out}/skills"
            tar -C "dist/${out}" -czf "dist/${out}.tar.gz" agent-packs agent-packs\ skills
          done
          # Windows amd64
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build \
            -ldflags "${LDFLAGS}" \
            -o "dist/agent-packs_windows_amd64/agent-packs.exe" ./cmd/agent-packs
          cp -R ../skills dist/agent-packs_windows_amd64/skills
          cd dist/agent-packs_windows_amd64 && zip -r ../agent-packs_windows_amd64.zip agent-packs.exe agent-packs\ skills && cd ../..
          # Checksums
          cd dist && sha256sum *.tar.gz *.zip > checksums.txt
        working-directory: cli

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cli/dist/*.tar.gz
            cli/dist/*.zip
            cli/dist/checksums.txt
          generate_release_notes: true
