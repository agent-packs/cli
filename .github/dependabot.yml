version: 2
updates:
  - package-ecosystem: gomod
    directory: /cli
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /tests
    schedule:
      interval: weekly
    groups:
      python-test-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
